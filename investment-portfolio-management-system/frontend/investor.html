<!DOCTYPE html>
<html>
<head>
  <title>Investor Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<div class="navbar">
  <a href="investor.html">Investor</a>
  <a href="advisor.html">Advisor</a>
  <a href="admin.html">Admin</a>
</div>
</head>
<body>

<div class="container">

  <header>
    <h1>Investor Dashboard</h1>
    <div class="user"></div>
  </header>

  <!-- Add Transaction -->
  <section class="card">
    <h2 style="margin-bottom:10px;">Add Transaction</h2>

    <form>
      <label>Asset</label>
      <select>
        <option>Select Asset...</option>
        <option>AAPL</option>
        <option>BTC</option>
        <option>TSLA</option>
      </select>

      <label>Type</label>
      <div class="radio-group">
        <label><input type="radio" name="type"> Buy</label>
        <label><input type="radio" name="type"> Sell</label>
      </div>

      <label>Quantity</label>
      <input type="number" placeholder="0.00">

      <label>Price</label>
      <input type="number" step="0.01" placeholder="$0.00">

      <label>Date</label>
      <input type="date">

      <button type="submit">Submit Transaction</button>
    </form>
  </section>

  <!-- Holdings -->
  <section class="card">
    <h2>Current Holdings</h2>
    <table>
      <tr><th>Asset</th><th>Quantity</th></tr>
      <tr><td>AAPL</td><td>15.00</td></tr>
      <tr><td>BTC</td><td>0.245</td></tr>
      <tr><td>TSLA</td><td>10.00</td></tr>
      <tr><td>VTI</td><td>50.00</td></tr>
    </table>
  </section>

  <!-- Transactions -->
  <section class="card">
    <h2>Transaction History</h2>
    <table>
      <tr><th>Date</th><th>Asset</th><th>Type</th><th>Qty</th><th>Price</th></tr>
      <tr><td>2024-02-10</td><td>AAPL</td><td>BUY</td><td>5.00</td><td>$180.20</td></tr>
      <tr><td>2024-02-05</td><td>BTC</td><td>BUY</td><td>0.01</td><td>$42000</td></tr>
      <tr><td>2024-01-20</td><td>VTI</td><td>SELL</td><td>2.00</td><td>$210.00</td></tr>
    </table>
  </section>

</div>

</body>
</html>
